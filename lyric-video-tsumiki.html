<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tsumiki — Gomafu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:     #f5efe4;
    --ink:       #3a2e28;
    --ink-soft:  #6b5a52;
    --terra:     #96604a;
    --terra-dim: rgba(150, 96, 74, 0.15);
    --blob-a:    rgba(180, 145, 120, 0.18);
    --blob-b:    rgba(200, 175, 150, 0.12);
    --blob-c:    rgba(150, 120, 100, 0.10);
    --reveal-dur: 1.6s;
    --dissolve-dur: 0.8s;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
  }

  /* ── watercolor background ─────────────────────────────── */
  #bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
  }

  .blob-a {
    width: 60vw; height: 60vw;
    top: -15%; left: -10%;
    background: radial-gradient(circle, rgba(180,145,120,0.22) 0%, transparent 70%);
    animation: drift-a 32s ease-in-out infinite alternate;
  }
  .blob-b {
    width: 50vw; height: 50vw;
    top: 30%; right: -12%;
    background: radial-gradient(circle, rgba(200,170,140,0.18) 0%, transparent 70%);
    animation: drift-b 28s ease-in-out infinite alternate;
  }
  .blob-c {
    width: 40vw; height: 40vw;
    bottom: -10%; left: 20%;
    background: radial-gradient(circle, rgba(160,130,110,0.14) 0%, transparent 70%);
    animation: drift-c 36s ease-in-out infinite alternate;
  }

  @keyframes drift-a {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(6vw, 8vh) scale(1.08); }
    100% { transform: translate(-4vw, 14vh) scale(0.95); }
  }
  @keyframes drift-b {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(-8vw, -6vh) scale(1.05); }
    100% { transform: translate(4vw, 10vh) scale(1.1); }
  }
  @keyframes drift-c {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(10vw, -4vh) scale(0.92); }
    100% { transform: translate(-6vw, -8vh) scale(1.06); }
  }

  /* paper texture overlay */
  #texture {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
  }

  /* subtle vignette */
  #vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(90,70,60,0.18) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* ── stage ─────────────────────────────────────────────── */
  #stage {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .section {
    position: absolute;
    width: 100%;
    max-width: 820px;
    padding: 0 8vw;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }

  /* ── text animations ────────────────────────────────────── */
  @keyframes inkReveal {
    0% {
      filter: blur(22px);
      opacity: 0;
      letter-spacing: 0.55em;
      transform: scale(1.05);
    }
    15% {
      opacity: 0.25;
    }
    45% {
      opacity: 0.65;
      filter: blur(7px);
      letter-spacing: 0.18em;
    }
    75% {
      filter: blur(2px);
      letter-spacing: 0.09em;
      transform: scale(1.008);
    }
    100% {
      filter: blur(0);
      opacity: 1;
      letter-spacing: 0.06em;
      transform: scale(1);
    }
  }

  @keyframes inkDissolve {
    0% {
      filter: blur(0);
      opacity: 1;
      letter-spacing: 0.06em;
      transform: scale(1);
    }
    40% {
      opacity: 0.5;
      filter: blur(5px);
      letter-spacing: 0.2em;
    }
    100% {
      filter: blur(18px);
      opacity: 0;
      letter-spacing: 0.5em;
      transform: scale(1.04);
    }
  }

  @keyframes titleReveal {
    0%   { filter: blur(28px); opacity: 0; letter-spacing: 0.7em; transform: scale(1.06); }
    30%  { opacity: 0.3; }
    70%  { filter: blur(4px); letter-spacing: 0.18em; }
    100% { filter: blur(0); opacity: 1; letter-spacing: 0.22em; transform: scale(1); }
  }

  .line {
    display: block;
    font-size: clamp(1.15rem, 3.2vw, 1.85rem);
    font-weight: 400;
    line-height: 2.2;
    color: var(--ink);
    opacity: 0;
    will-change: filter, opacity, letter-spacing, transform;
  }

  .line.reveal {
    animation: inkReveal var(--reveal-dur) cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .line.dissolve {
    animation: inkDissolve var(--dissolve-dur) ease-in forwards;
  }

  /* chorus lines */
  .chorus .line {
    color: var(--terra);
    font-size: clamp(1.2rem, 3.5vw, 2rem);
    font-weight: 500;
  }

  /* title section */
  .title-section .song-title {
    display: block;
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(2.2rem, 7vw, 4.5rem);
    font-weight: 300;
    letter-spacing: 0.22em;
    color: var(--ink);
    opacity: 0;
    will-change: filter, opacity, letter-spacing, transform;
    line-height: 1.3;
  }

  .title-section .song-title.reveal {
    animation: titleReveal 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .title-section .credit {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.75rem, 1.8vw, 1rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--ink-soft);
    margin-top: 1.4em;
    opacity: 0;
    will-change: filter, opacity, letter-spacing, transform;
  }

  .title-section .credit.reveal {
    animation: inkReveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* outro */
  .outro .line {
    font-size: clamp(1.4rem, 4vw, 2.5rem);
    font-weight: 300;
    color: var(--ink);
    letter-spacing: 0.08em;
  }

  /* section divider (thin rule between groups of lines) */
  .spacer { height: 0.6em; display: block; }

  /* ── UI chrome ──────────────────────────────────────────── */
  #hint {
    position: fixed;
    top: 2.2vh;
    left: 3vw;
    z-index: 50;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.6rem, 1.3vw, 0.8rem);
    color: var(--ink-soft);
    opacity: 0.6;
    letter-spacing: 0.12em;
    transition: opacity 1.2s ease;
    line-height: 1.8;
    pointer-events: none;
  }
  #hint.hidden { opacity: 0; }

  #indicator {
    position: fixed;
    bottom: 3.5vh;
    right: 3.5vw;
    z-index: 50;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.55rem, 1.1vw, 0.72rem);
    color: var(--ink-soft);
    opacity: 0.45;
    letter-spacing: 0.15em;
    pointer-events: none;
  }

  /* auto-advance progress bar */
  #progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 1.5px;
    width: 0%;
    background: var(--terra);
    opacity: 0;
    z-index: 50;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  #progress-bar.active {
    opacity: 0.5;
  }

  /* auto-mode indicator */
  #auto-label {
    position: fixed;
    bottom: 3.5vh;
    left: 3vw;
    z-index: 50;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.55rem, 1.1vw, 0.72rem);
    color: var(--terra);
    opacity: 0;
    letter-spacing: 0.15em;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  #auto-label.visible { opacity: 0.6; }
</style>
</head>
<body>

<!-- watercolor background -->
<div id="bg">
  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>
  <div class="blob blob-c"></div>
</div>

<!-- paper noise texture -->
<svg id="texture" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#paper)" fill="white"/>
</svg>

<div id="vignette"></div>

<!-- lyric stage -->
<div id="stage"></div>

<!-- UI -->
<div id="hint">
  ← → <span style="letter-spacing:0.05em">or</span> Space &nbsp;·&nbsp; セクション移動<br>
  F &nbsp;·&nbsp; フルスクリーン<br>
  A &nbsp;·&nbsp; 自動進行
</div>

<div id="indicator"></div>
<div id="progress-bar"></div>
<div id="auto-label">auto</div>

<script>
const SECTIONS = [
  {
    type: 'title',
    lines: ['tsumiki'],
    credit: '作詞・作曲　Kenta',
  },
  {
    type: 'verse',
    lines: [
      '積み木の山　ぼくの手の中',
      '色とりどりの　夢の欠片',
      '何にでもなれる　そう信じてる',
      '幼い心の　無限の未来',
    ],
  },
  {
    type: 'verse',
    lines: [
      '四角い笑顔　丸い冒険',
      '崩しては重ねた物語',
      '小さな両手に　大きな世界',
      '描き尽くせない　ぼくの夢',
    ],
  },
  {
    type: 'chorus',
    lines: [
      '積み木の塔　空に伸びて',
      '小さな両手は　無限を描く',
      'ときめく心が指し示す光',
      'ぼくは創る　積み木の世界',
    ],
  },
  {
    type: 'verse',
    lines: [
      '大人になって　囚われてる',
      '積み上げるだけが　正解だと',
      '崩す喜び　並べる自由',
      '忘れていたんだ　あの日のぼくを',
    ],
  },
  {
    type: 'chorus',
    lines: [
      '積み木の城　空に築け',
      '疲れた両手で　無限を描け',
      '揺れる心が見出した光',
      'ぼくは創る　積み木な未来',
    ],
  },
  {
    type: 'outro',
    lines: ['ぼくは創る　積み木の世界'],
  },
];

const SECTION_DURATION = 9000; // ms for auto-advance
const STAGGER = 220; // ms per line
const REVEAL_DURATION = 1600;
const DISSOLVE_DURATION = 800;

const stage = document.getElementById('stage');
const indicator = document.getElementById('indicator');
const progressBar = document.getElementById('progress-bar');
const autoLabel = document.getElementById('auto-label');
const hint = document.getElementById('hint');

let current = 0;
let transitioning = false;
let autoMode = false;
let autoTimer = null;
let progressAnim = null;

// ── DOM builder ───────────────────────────────────────────

function buildSection(data, index) {
  const el = document.createElement('div');
  el.className = 'section';
  el.dataset.index = index;

  if (data.type === 'title') {
    el.classList.add('title-section');
    const title = document.createElement('span');
    title.className = 'song-title';
    title.textContent = data.lines[0];
    el.appendChild(title);

    if (data.credit) {
      const cred = document.createElement('span');
      cred.className = 'credit';
      cred.textContent = data.credit;
      el.appendChild(cred);
    }
  } else {
    if (data.type === 'chorus') el.classList.add('chorus');
    if (data.type === 'outro')  el.classList.add('outro');

    data.lines.forEach((text, i) => {
      const line = document.createElement('span');
      line.className = 'line';
      line.textContent = text;
      line.dataset.i = i;
      el.appendChild(line);
    });
  }

  return el;
}

// pre-build all sections
const sectionEls = SECTIONS.map((data, i) => {
  const el = buildSection(data, i);
  stage.appendChild(el);
  return el;
});

// ── animation helpers ──────────────────────────────────────

function revealSection(el, data) {
  if (data.type === 'title') {
    const title = el.querySelector('.song-title');
    const cred  = el.querySelector('.credit');
    title.classList.remove('reveal');
    void title.offsetWidth;
    title.style.animationDelay = '0ms';
    title.classList.add('reveal');

    if (cred) {
      cred.classList.remove('reveal');
      void cred.offsetWidth;
      cred.style.animationDelay = '700ms';
      cred.classList.add('reveal');
    }
  } else {
    const lines = el.querySelectorAll('.line');
    lines.forEach((line, i) => {
      line.classList.remove('reveal', 'dissolve');
      line.style.opacity = '0';
      void line.offsetWidth;
      line.style.animationDelay = `${i * STAGGER}ms`;
      line.classList.add('reveal');
    });
  }
}

function dissolveSection(el, data, onDone) {
  if (data.type === 'title') {
    const els = el.querySelectorAll('.song-title, .credit');
    let count = els.length;
    els.forEach(e => {
      e.classList.remove('reveal');
      void e.offsetWidth;
      e.style.animationDelay = '0ms';
      e.style.animation = `inkDissolve ${DISSOLVE_DURATION}ms ease-in forwards`;
      e.addEventListener('animationend', () => {
        count--;
        if (count === 0 && onDone) onDone();
      }, { once: true });
    });
  } else {
    const lines = el.querySelectorAll('.line');
    let count = lines.length;
    lines.forEach((line, i) => {
      line.classList.remove('reveal');
      void line.offsetWidth;
      line.style.animationDelay = `${i * 50}ms`;
      line.classList.add('dissolve');
      line.addEventListener('animationend', () => {
        count--;
        if (count === 0 && onDone) onDone();
      }, { once: true });
    });
  }
}

function updateIndicator() {
  const total = SECTIONS.length;
  indicator.textContent = `${current + 1} / ${total}`;
}

// ── section navigation ────────────────────────────────────

function showSection(index, animate = true) {
  if (transitioning) return;
  if (index < 0 || index >= SECTIONS.length) return;

  const prevEl   = sectionEls[current];
  const prevData = SECTIONS[current];
  const nextEl   = sectionEls[index];
  const nextData = SECTIONS[index];

  if (!animate || current === index) {
    // instant switch (initial)
    sectionEls.forEach(el => { el.style.display = 'none'; });
    nextEl.style.display = '';
    revealSection(nextEl, nextData);
    current = index;
    updateIndicator();
    return;
  }

  transitioning = true;

  dissolveSection(prevEl, prevData, () => {
    prevEl.style.display = 'none';
    current = index;
    nextEl.style.display = '';
    revealSection(nextEl, nextData);
    updateIndicator();
    transitioning = false;

    if (autoMode) scheduleAuto();
  });
}

function next() {
  if (current < SECTIONS.length - 1) showSection(current + 1, true);
}

function prev() {
  if (current > 0) showSection(current - 1, true);
}

// ── auto-advance ──────────────────────────────────────────

function scheduleAuto() {
  clearAutoTimer();
  if (!autoMode) return;

  let elapsed = 0;
  const tick = 50;
  progressBar.style.width = '0%';

  progressAnim = setInterval(() => {
    elapsed += tick;
    const pct = Math.min((elapsed / SECTION_DURATION) * 100, 100);
    progressBar.style.width = pct + '%';
    if (elapsed >= SECTION_DURATION) {
      clearAutoTimer();
      if (current < SECTIONS.length - 1) next();
      else {
        autoMode = false;
        setAutoUI(false);
      }
    }
  }, tick);
}

function clearAutoTimer() {
  if (progressAnim) { clearInterval(progressAnim); progressAnim = null; }
  progressBar.style.width = '0%';
}

function setAutoUI(on) {
  if (on) {
    progressBar.classList.add('active');
    autoLabel.classList.add('visible');
  } else {
    progressBar.classList.remove('active');
    autoLabel.classList.remove('visible');
    clearAutoTimer();
  }
}

function toggleAuto() {
  autoMode = !autoMode;
  setAutoUI(autoMode);
  if (autoMode) scheduleAuto();
}

// ── keyboard ──────────────────────────────────────────────

document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowRight':
    case ' ':
      e.preventDefault();
      clearAutoTimer();
      next();
      if (autoMode) scheduleAuto();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      clearAutoTimer();
      prev();
      if (autoMode) scheduleAuto();
      break;
    case 'f':
    case 'F':
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
      else document.exitFullscreen().catch(() => {});
      break;
    case 'a':
    case 'A':
      toggleAuto();
      break;
  }
});

// hide hint after 5 s
setTimeout(() => hint.classList.add('hidden'), 5000);

// ── init ──────────────────────────────────────────────────

sectionEls.forEach(el => { el.style.display = 'none'; });
sectionEls[0].style.display = '';
revealSection(sectionEls[0], SECTIONS[0]);
updateIndicator();
</script>
</body>
</html>
